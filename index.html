<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>カーブミラー</title>
<link rel="icon" type="image/png" href="webicon.png?v=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1428;
    --paper: #fff;
    --frame: #d65a1f;
    --frame-hi: #f08040;
  }

  html, body {
    height: 100%; overflow: hidden;
    background: #0a0e18;
    font-family: 'Press Start 2P', monospace;
    color: var(--paper);
    -webkit-font-smoothing: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ─── full-bleed mirror photo as UI frame ─── */
  #mirrorPhoto {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 0;
    pointer-events: none;
  }

  /* ─── camera canvas, sized & placed by JS to match inner mirror circle ─── */
  canvas#render {
    position: fixed;
    border-radius: 50%;
    z-index: 1;
    /* subtly darken edges to blend with the mirror's curved reflection look */
    box-shadow: inset 0 0 60px rgba(0,0,0,.18);
  }
  video#cam { display: none; }

  /* ─── UI chrome sits above photo and canvas ─── */
  .status {
    position: fixed; left: 14px; top: 14px;
    font-size: 8px; letter-spacing: 2px;
    color: var(--paper);
    text-shadow: 2px 2px 0 var(--ink);
    z-index: 10; opacity: .8;
  }
  .sky-toggle, .pinch-toggle {
    position: fixed; right: 14px;
    z-index: 10;
    font-family: inherit;
    font-size: 8px; letter-spacing: 2px;
    color: var(--paper);
    background: rgba(10, 14, 24, .60);
    border: 3px solid var(--ink);
    padding: 8px 10px;
    cursor: pointer;
    text-shadow: 1px 1px 0 var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .sky-toggle   { top: 12px; }
  .pinch-toggle { top: 56px; }
  .sky-toggle:hover, .pinch-toggle:hover { background: rgba(40, 56, 96, .75); }
  .sky-toggle:active, .pinch-toggle:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }

  .hint {
    position: fixed; left: 0; right: 0; bottom: 22px;
    text-align: center; font-size: 9px; letter-spacing: 3px;
    color: var(--paper); text-shadow: 2px 2px 0 var(--ink);
    z-index: 10; opacity: .9;
  }

  /* ─── start gate ─── */
  .gate {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background: rgba(7, 16, 28, .55);
    backdrop-filter: blur(2px);
    z-index: 100;
  }
  .gate-inner { display: flex; flex-direction: column; gap: 22px; align-items: center; }
  .gate-sub { font-size: 9px; letter-spacing: 3px; color: var(--paper); text-shadow: 2px 2px 0 var(--ink); opacity: .85; }
  .btn {
    font-family: inherit; font-size: 12px; letter-spacing: 3px;
    color: var(--paper); background: var(--frame);
    border: 4px solid var(--ink); padding: 16px 28px;
    cursor: pointer; box-shadow: 5px 5px 0 var(--ink);
    transition: transform 60ms, box-shadow 60ms;
  }
  .btn:hover { background: var(--frame-hi); }
  .btn:active { transform: translate(3px,3px); box-shadow: 2px 2px 0 var(--ink); }
  .btn[disabled] { opacity: .55; cursor: default; }

  .dot {
    display: inline-block; width: 8px; height: 8px;
    background: #d23030; margin-right: 6px; vertical-align: 1px;
  }
  .dot.live { background: #4ade80; }
</style>
</head>
<body>
  <!-- real traffic mirror photo as the full UI frame -->
  <img id="mirrorPhoto" src="image%203.png" alt="">

  <!-- camera canvas, positioned over the inner mirror circle by JS -->
  <canvas id="render"></canvas>
  <video id="cam" autoplay playsinline muted></video>

  <div class="status"><span class="dot" id="dot"></span><span id="statusText">OFFLINE</span></div>
  <button class="sky-toggle" id="skyToggle" aria-label="toggle sky backdrop">SKY: OFF</button>
  <button class="pinch-toggle" id="pinchToggle" aria-label="toggle pinch radius gesture">PINCH: ON</button>

  <div class="hint" id="hint">POINT  YOUR  FINGER  AT  THE  MIRROR</div>

  <div class="gate" id="gate">
    <div class="gate-inner">
      <button class="btn" id="startBtn">PRESS START</button>
      <div class="gate-sub" id="gateSub">CAMERA ACCESS REQUIRED</div>
    </div>
  </div>

<script type="module">
  // ------------------------------------------------------------------
  // refs
  // ------------------------------------------------------------------
  const video       = document.getElementById('cam');
  const canvas      = document.getElementById('render');
  const mirrorPhoto = document.getElementById('mirrorPhoto');
  const gate        = document.getElementById('gate');
  const gateSub     = document.getElementById('gateSub');
  const startBtn    = document.getElementById('startBtn');
  const dot         = document.getElementById('dot');
  const statusText  = document.getElementById('statusText');
  const hint        = document.getElementById('hint');
  const skyToggle   = document.getElementById('skyToggle');
  const pinchToggle = document.getElementById('pinchToggle');

  // virtual backdrop cycles: 0 = OFF, 1 = SKY, 2 = COUNTRY SIDE
  let bgMode = 0;
  const BG_LABELS = ['BG: OFF', 'BG: SKY', 'BG: FIELD'];
  skyToggle.textContent = BG_LABELS[bgMode];
  skyToggle.addEventListener('click', () => {
    bgMode = (bgMode + 1) % BG_LABELS.length;
    skyToggle.textContent = BG_LABELS[bgMode];
  });

  // pinch-to-resize gesture (radius scrub via thumb-index posture)
  let usePinch = true;
  pinchToggle.addEventListener('click', () => {
    usePinch = !usePinch;
    pinchToggle.textContent = usePinch ? 'PINCH: ON' : 'PINCH: OFF';
    if (!usePinch) {
      scrubMode = false;       // bail out of any in-progress scrub
      lockedMin = false;       // and release fist-lock if engaged
    }
  });

  // Known dimensions of image 3.png
  const IMG_W = 4764, IMG_H = 3200;
  // Inner mirror circle position in the photo (fractions of image size)
  const CX_PCT = 0.500, CY_PCT = 0.552, CR_PCT = 0.375;
  // Oval viewport ratio (mirror is not a perfect circle)
  const OVAL_W = 557, OVAL_H = 580, OVAL_ASPECT = OVAL_W / OVAL_H;
  // Sky background image dimensions
  const SKY_W = 2496, SKY_H = 1582;
  // Country side background image dimensions
  const FIELD_W = 2382, FIELD_H = 1600;

  // Live screen-space circle coords, updated by resize()
  let mirrorCx = 0, mirrorCy = 0, mirrorR = 1;

  // ------------------------------------------------------------------
  // WebGL setup
  // ------------------------------------------------------------------
  const gl = canvas.getContext('webgl', { antialias: false, premultipliedAlpha: false });
  if (!gl) {
    gateSub.textContent = 'WEBGL NOT AVAILABLE';
    startBtn.disabled = true;
  }

  const VS = `
    attribute vec2 a_pos;
    varying vec2 v_uv;
    void main() {
      v_uv = a_pos * 0.5 + 0.5;
      gl_Position = vec4(a_pos, 0.0, 1.0);
    }
  `;

  // bulge + cover-fit + horizontal mirror; optional virtual-sky backdrop
  const FS = `
    precision highp float;
    varying vec2 v_uv;

    uniform sampler2D u_tex;       // camera frame
    uniform sampler2D u_mask;         // person-confidence mask (1 = person)
    uniform sampler2D u_skyTex;       // plain sky background image
    uniform sampler2D u_fieldTex;     // country side background image
    uniform vec2  u_finger;           // bottom-up [0..1]
    uniform float u_strength;
    uniform float u_radius;
    uniform float u_videoAspect;
    uniform float u_bgMode;           // 0 = off, 1 = sky, 2 = field
    uniform float u_maskReady;        // 0 if no mask uploaded yet
    uniform vec2  u_maskSize;         // mask texture dimensions for texel offset
    uniform float u_fisheye;          // barrel distortion strength
    uniform float u_canvasAspect;     // canvas width/height (oval correction)
    uniform float u_skyImgAspect;     // sky texture width/height
    uniform float u_fieldImgAspect;   // country side texture width/height

    // 3x3 Gaussian blur on the mask for smooth, anti-aliased person edges
    float blurMask(vec2 uv) {
      vec2 t = 1.0 / u_maskSize;
      float m = 0.0;
      m += texture2D(u_mask, uv + vec2(-t.x,-t.y)).r * 0.0625;
      m += texture2D(u_mask, uv + vec2( 0.0,-t.y)).r * 0.125;
      m += texture2D(u_mask, uv + vec2( t.x,-t.y)).r * 0.0625;
      m += texture2D(u_mask, uv + vec2(-t.x, 0.0)).r * 0.125;
      m += texture2D(u_mask, uv                  ).r * 0.25;
      m += texture2D(u_mask, uv + vec2( t.x, 0.0)).r * 0.125;
      m += texture2D(u_mask, uv + vec2(-t.x, t.y)).r * 0.0625;
      m += texture2D(u_mask, uv + vec2( 0.0, t.y)).r * 0.125;
      m += texture2D(u_mask, uv + vec2( t.x, t.y)).r * 0.0625;
      return m;
    }

    void main() {
      vec2 uv = v_uv;

      // Bulge in canvas space
      if (u_strength > 0.001) {
        vec2 d = uv - u_finger;
        float r = length(d);
        if (r < u_radius && r > 0.0) {
          float pct = r / u_radius;
          float k = pow(pct, 1.0 + u_strength * 0.7);
          uv = u_finger + normalize(d) * k * u_radius;
        }
      }

      // Barrel distortion with oval aspect correction
      // Rescaled so canvas edge → camera edge (no overflow, fills whole oval)
      if (u_fisheye > 0.001) {
        vec2 d = uv - 0.5;
        d.x /= u_canvasAspect;                       // normalize into circular space
        float r2 = dot(d, d);
        float maxScale = 1.0 + u_fisheye * 0.25;     // scale at r=0.5 (canvas edge)
        d = d * ((1.0 + u_fisheye * r2) / maxScale); // edge maps to edge
        d.x *= u_canvasAspect;                       // restore oval space
        uv = 0.5 + d;
      }

      // Fade pixels where barrel pushed UV outside [0,1] — eliminates CLAMP_TO_EDGE stretch
      vec2 overflow = abs(uv - clamp(uv, 0.0, 1.0));
      float inBounds = 1.0 - smoothstep(0.0, 0.02, length(overflow));

      // Mirror horizontally + cover-fit for camera/mask
      vec2 vUv = vec2(1.0 - uv.x, uv.y);
      float a = u_videoAspect;
      if (a > 1.0) {
        vUv.x = (vUv.x - 0.5) / a + 0.5;
      } else {
        vUv.y = (vUv.y - 0.5) * a + 0.5;
      }

      vec3 cam = texture2D(u_tex, vUv).rgb;

      vec3 col = cam;
      if (u_bgMode > 0.5 && u_maskReady > 0.5) {
        float personMask = blurMask(vUv);
        // Pick aspect of the active backdrop and cover-fit into the oval
        float bgAspect = (u_bgMode > 1.5) ? u_fieldImgAspect : u_skyImgAspect;
        vec2 bgUv = clamp(vec2(
          0.5 + (uv.x - 0.5) * (u_canvasAspect / bgAspect),
          uv.y
        ), 0.0, 1.0);
        vec3 bg;
        if (u_bgMode > 1.5) {
          bg = texture2D(u_fieldTex, bgUv).rgb;
        } else {
          bg = texture2D(u_skyTex, bgUv).rgb;
        }
        col = mix(bg, cam, personMask);
      }

      // subtle vignette
      vec2 c = v_uv - 0.5;
      float vig = smoothstep(0.72, 0.42, length(c));
      col *= mix(0.85, 1.0, vig);

      gl_FragColor = vec4(col, inBounds);
    }
  `;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('shader error:', gl.getShaderInfoLog(s), src);
    }
    return s;
  }

  const program = gl.createProgram();
  gl.attachShader(program, compile(gl.VERTEX_SHADER, VS));
  gl.attachShader(program, compile(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    console.error('link error:', gl.getProgramInfoLog(program));
  }
  gl.useProgram(program);

  // fullscreen quad
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(program, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  // texture for video frame (unit 0)
  const tex = gl.createTexture();
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE,
    new Uint8Array([10, 16, 28, 255]));

  // texture for person-confidence mask (unit 1)
  const maskTex = gl.createTexture();
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, maskTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE, 1, 1, 0, gl.LUMINANCE, gl.UNSIGNED_BYTE,
    new Uint8Array([0]));

  // sky image texture (unit 2)
  const skyTex = gl.createTexture();
  gl.activeTexture(gl.TEXTURE2);
  gl.bindTexture(gl.TEXTURE_2D, skyTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE,
    new Uint8Array([100, 160, 220, 255]));
  const skyImg = new Image();
  skyImg.onload = () => {
    gl.activeTexture(gl.TEXTURE2);
    gl.bindTexture(gl.TEXTURE_2D, skyTex);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, skyImg);
  };
  skyImg.src = 'plain%20sky%20background.png';

  // country side image texture (unit 3)
  const fieldTex = gl.createTexture();
  gl.activeTexture(gl.TEXTURE3);
  gl.bindTexture(gl.TEXTURE_2D, fieldTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE,
    new Uint8Array([90, 160, 90, 255]));
  const fieldImg = new Image();
  fieldImg.onload = () => {
    gl.activeTexture(gl.TEXTURE3);
    gl.bindTexture(gl.TEXTURE_2D, fieldTex);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, fieldImg);
  };
  fieldImg.src = 'country%20side%20background.png';

  // fallback: load the reference mirror photo as fallback texture
  const fallbackImg = new Image();
  let fallbackLoaded = false;
  fallbackImg.onload = () => { fallbackLoaded = true; };
  fallbackImg.onerror = () => { console.warn('reference image not found'); };
  fallbackImg.src = 'image%203.png';

  const u = {
    tex:            gl.getUniformLocation(program, 'u_tex'),
    mask:           gl.getUniformLocation(program, 'u_mask'),
    skyTex:         gl.getUniformLocation(program, 'u_skyTex'),
    fieldTex:       gl.getUniformLocation(program, 'u_fieldTex'),
    finger:         gl.getUniformLocation(program, 'u_finger'),
    strength:       gl.getUniformLocation(program, 'u_strength'),
    radius:         gl.getUniformLocation(program, 'u_radius'),
    videoAspect:    gl.getUniformLocation(program, 'u_videoAspect'),
    bgMode:         gl.getUniformLocation(program, 'u_bgMode'),
    maskReady:      gl.getUniformLocation(program, 'u_maskReady'),
    maskSize:       gl.getUniformLocation(program, 'u_maskSize'),
    fisheye:        gl.getUniformLocation(program, 'u_fisheye'),
    canvasAspect:   gl.getUniformLocation(program, 'u_canvasAspect'),
    skyImgAspect:   gl.getUniformLocation(program, 'u_skyImgAspect'),
    fieldImgAspect: gl.getUniformLocation(program, 'u_fieldImgAspect'),
  };
  gl.uniform1i(u.tex, 0);
  gl.uniform1i(u.mask, 1);
  gl.uniform1i(u.skyTex, 2);
  gl.uniform1i(u.fieldTex, 3);
  gl.uniform1f(u.skyImgAspect,   SKY_W   / SKY_H);
  gl.uniform1f(u.fieldImgAspect, FIELD_W / FIELD_H);
  gl.uniform2f(u.maskSize, 256, 256); // default; updated on first mask upload

  // ------------------------------------------------------------------
  // state
  // ------------------------------------------------------------------
  const finger = { x: 0.5, y: 0.5 };
  const target = { x: 0.5, y: 0.5 };
  let strength = 0;
  let targetStrength = 0;
  let handLandmarker = null;
  let usingMouse = false;
  let videoAspect = 4 / 3;
  let lastDetectTime = -1;
  let handLossCount = 0;

  // Pinch-controlled bulge radius — uses POSTURE, not raw pinch distance.
  // pinchRatio = dist(thumb_tip, index_tip) / dist(thumb_tip, wrist)
  //   • Pointing (thumb curled into palm) → thumb close to wrist → ratio LARGE (~1.0+)
  //   • OK-sign / pinching (thumb extended forward) → ratio SMALL (~0.05–0.4)
  // The shape ratio is invariant to hand size and camera distance, so it cleanly
  // separates the two postures regardless of absolute pinch distance.
  // Inside scrub mode the same ratio drives the radius (smaller ratio = smaller radius).
  // Hysteresis (ENTER < EXIT) keeps the mode stable around the threshold.
  const RADIUS_DEFAULT  = 0.32;
  const RADIUS_MIN      = 0.14;
  const RADIUS_MAX      = 0.55;
  const RATIO_SCRUB_MAX = 0.40;  // ratio mapped to RADIUS_MAX (top of scrub range)
  const RATIO_ENTER     = 0.35;  // drop below this → engage scrub
  const RATIO_EXIT      = 0.55;  // rise above this → release & freeze
  // Fist gesture: closes hand → locks radius at RADIUS_MIN until you open up again.
  // We use MAX(fingertip→wrist) / palmSize across index/middle/ring/pinky — a fist
  // requires every finger curled, so even one extended finger (e.g. the index in a
  // pointing pose) keeps the max high and prevents accidental locking.
  //   • Open hand or pointing: max ≈ 1.7+    • Fist: max ≈ 1.0
  const EXT_FIST_ENTER  = 1.20;  // max drops below this → fist detected → lock-min
  const EXT_FIST_EXIT   = 1.45;  // max rises above this → release the lock
  let radius       = RADIUS_DEFAULT;
  let targetRadius = RADIUS_DEFAULT;
  let scrubMode    = false;
  let lockedMin    = false;
  let fallbackUploaded = false;
  let useFallback = false;
  let segmenter = null;
  let maskReady = false;
  let lastSegTime = -1;

  function setStatus(text, live) {
    statusText.textContent = text;
    dot.classList.toggle('live', !!live);
  }

  // ------------------------------------------------------------------
  // resize: compute mirror circle position from photo cover-fit geometry
  // ------------------------------------------------------------------
  function resize() {
    const sw = window.innerWidth, sh = window.innerHeight;
    const scale = Math.max(sw / IMG_W, sh / IMG_H);
    const rw = IMG_W * scale, rh = IMG_H * scale;
    const ox = (sw - rw) / 2, oy = (sh - rh) / 2;

    mirrorCx = ox + CX_PCT * rw;
    mirrorCy = oy + CY_PCT * rh;
    mirrorR  = CR_PCT * IMG_H * scale;

    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const cssH = Math.round(mirrorR * 2);
    const cssW = Math.round(cssH * OVAL_ASPECT);   // oval: width ≠ height
    canvas.style.left   = Math.round(mirrorCx - cssW / 2) + 'px';
    canvas.style.top    = Math.round(mirrorCy - mirrorR) + 'px';
    canvas.style.width  = cssW + 'px';
    canvas.style.height = cssH + 'px';
    canvas.width  = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.uniform1f(u.canvasAspect, OVAL_ASPECT);
  }
  window.addEventListener('resize', resize);

  // ------------------------------------------------------------------
  // camera
  // ------------------------------------------------------------------
  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'user',
        width:  { ideal: 640 },
        height: { ideal: 480 }
      },
      audio: false
    });
    video.srcObject = stream;
    await new Promise((res) => {
      if (video.readyState >= 1) res();
      else video.onloadedmetadata = () => res();
    });
    await video.play();
    videoAspect = (video.videoWidth || 640) / (video.videoHeight || 480);
  }

  // ------------------------------------------------------------------
  // hand detection (MediaPipe Tasks Vision)
  // ------------------------------------------------------------------
  async function initVision() {
    const mod = await import(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/vision_bundle.mjs'
    );
    const { FilesetResolver, HandLandmarker, ImageSegmenter } = mod;
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm'
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath:
          'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
        delegate: 'GPU'
      },
      runningMode: 'VIDEO',
      numHands: 1,
      minHandDetectionConfidence: 0.4,
      minHandPresenceConfidence: 0.4,
      minTrackingConfidence: 0.4
    });
    // selfie segmenter for virtual sky backdrop
    try {
      segmenter = await ImageSegmenter.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            'https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/1/selfie_segmenter.tflite',
          delegate: 'GPU'
        },
        runningMode: 'VIDEO',
        outputCategoryMask: false,
        outputConfidenceMasks: true
      });
    } catch (e) {
      console.warn('segmenter unavailable:', e);
    }
  }

  // mouse / touch fallback (cursor inside the physical mirror circle → bulge)
  function bindMouse() {
    const move = (clientX, clientY) => {
      const dx = clientX - mirrorCx;
      const dy = clientY - mirrorCy;
      if (dx*dx + dy*dy > mirrorR*mirrorR) {
        if (usingMouse) targetStrength = 0;
        return false;
      }
      // convert to canvas [0..1], flip y for shader (bottom-up)
      target.x = dx / mirrorR * 0.5 + 0.5;
      target.y = 1 - (dy / mirrorR * 0.5 + 0.5);
      usingMouse = true;
      targetStrength = 1;
      return true;
    };
    window.addEventListener('mousemove', (e) => move(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => {
      const t = e.touches[0]; if (!t) return;
      if (move(t.clientX, t.clientY)) e.preventDefault();
    }, { passive: false });
    window.addEventListener('touchend', () => { if (usingMouse) targetStrength = 0; });
  }

  // ------------------------------------------------------------------
  // render loop
  // ------------------------------------------------------------------
  function render() {
    const haveVideo = video.readyState >= 2 && video.videoWidth > 0;
    if (haveVideo) {
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
      gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, false);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video);
    } else if (useFallback && fallbackLoaded && !fallbackUploaded) {
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
      gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, false);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, fallbackImg);
      videoAspect = fallbackImg.naturalWidth / fallbackImg.naturalHeight;
      fallbackUploaded = true;
    }
    if (haveVideo || useFallback) {

      // run segmenter (only when a backdrop is selected, and only when video advances)
      if (haveVideo && bgMode > 0 && segmenter && video.currentTime !== lastSegTime) {
        lastSegTime = video.currentTime;
        try {
          const segRes = segmenter.segmentForVideo(video, performance.now());
          const m = segRes && segRes.confidenceMasks && segRes.confidenceMasks[0];
          if (m) {
            // selfie segmenter outputs 0..1 floats — convert to 0..255 bytes
            const f = m.getAsFloat32Array();
            const bytes = new Uint8Array(f.length);
            for (let i = 0; i < f.length; i++) bytes[i] = Math.round(f[i] * 255);
            gl.activeTexture(gl.TEXTURE1);
            gl.bindTexture(gl.TEXTURE_2D, maskTex);
            // mask is in raw video orientation (y=0 top); FLIP_Y flips to match texture v=1 = top
            gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
            gl.pixelStorei(gl.UNPACK_ALIGNMENT, 1);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE, m.width, m.height, 0,
                          gl.LUMINANCE, gl.UNSIGNED_BYTE, bytes);
            gl.uniform2f(u.maskSize, m.width, m.height);
            maskReady = true;
            m.close();
          }
        } catch (e) { /* ignore transient errors */ }
      }

      // detect hand once per new frame
      if (handLandmarker && video.currentTime !== lastDetectTime) {
        lastDetectTime = video.currentTime;
        const t = performance.now();
        let result = null;
        try { result = handLandmarker.detectForVideo(video, t); }
        catch (e) { /* ignore transient errors during init */ }

        if (result && result.landmarks && result.landmarks.length > 0) {
          // index fingertip = lm 8, thumb tip = lm 4, wrist = lm 0
          const lmIndex = result.landmarks[0][8];
          const lmThumb = result.landmarks[0][4];
          const lmWrist = result.landmarks[0][0];
          // raw video coords (top-down) → shader uv (mirrored x, bottom-up y)
          let cx = 1 - lmIndex.x;
          let cy = 1 - lmIndex.y;
          const a = videoAspect;
          if (a > 1.0) {
            cx = (cx - 0.5) * a + 0.5;
          } else {
            cy = (cy - 0.5) / a + 0.5;
          }
          target.x = cx;
          target.y = cy;

          if (usePinch) {
            // Aspect-corrected euclidean distance helper (lm coords are in normalized
            // [0..1] but the frame is wider than tall, so x has to be rescaled).
            const dist = (p, q) => {
              const dx = (p.x - q.x) * videoAspect;
              const dy = (p.y - q.y);
              return Math.sqrt(dx * dx + dy * dy);
            };

            // Fist detection: MAX fingertip extension (relative to palm size).
            // palmSize = wrist→middle-MCP gives a stable hand-size baseline.
            // Using the max (not mean) means any single extended finger — e.g. the
            // index during a pointing pose — keeps the score high and avoids a
            // false "fist" trigger.
            const lmMidTip   = result.landmarks[0][12];
            const lmRingTip  = result.landmarks[0][16];
            const lmPinkyTip = result.landmarks[0][20];
            const lmMidMCP   = result.landmarks[0][9];
            const palmSize = Math.max(dist(lmWrist, lmMidMCP), 1e-3);
            const extension = Math.max(
              dist(lmIndex,    lmWrist),
              dist(lmMidTip,   lmWrist),
              dist(lmRingTip,  lmWrist),
              dist(lmPinkyTip, lmWrist)
            ) / palmSize;

            // Hysteretic fist lock — closed fist locks radius at MIN; opening releases.
            if (!lockedMin && extension < EXT_FIST_ENTER) {
              lockedMin = true;
              scrubMode = false;          // any in-progress scrub is cancelled
            } else if (lockedMin && extension > EXT_FIST_EXIT) {
              lockedMin = false;
            }

            if (lockedMin) {
              targetRadius = RADIUS_MIN;
            } else {
              // Pinch-ratio scrub (only runs while not in fist-lock)
              const dThumbIdx   = dist(lmThumb, lmIndex);
              const dThumbWrist = dist(lmThumb, lmWrist);
              // Posture ratio: small = pinching (OK-sign), large = pointing/curled thumb
              const pinchRatio = dThumbIdx / Math.max(dThumbWrist, 1e-3);

              if (!scrubMode && pinchRatio < RATIO_ENTER) {
                scrubMode = true;
              } else if (scrubMode && pinchRatio > RATIO_EXIT) {
                scrubMode = false;
              }
              if (scrubMode) {
                // Map ratio [0..RATIO_SCRUB_MAX] → t [0..1] → radius [MIN..MAX]
                const t = Math.max(0, Math.min(1, pinchRatio / RATIO_SCRUB_MAX));
                targetRadius = RADIUS_MIN + t * (RADIUS_MAX - RADIUS_MIN);
              }
            }
          }

          targetStrength = 1;
          usingMouse = false;
          handLossCount = 0;
          if (lockedMin)      setStatus('LOCKED MIN', true);
          else if (scrubMode) setStatus('SCRUBBING',  true);
          else                setStatus('TRACKING',   true);
        } else if (!usingMouse) {
          handLossCount++;
          if (handLossCount > 4) targetStrength = 0;
          setStatus('LOOKING…', true);
        }
      }
    }

    // smoothing: snap toward target
    const lerp = 0.22;
    finger.x += (target.x - finger.x) * lerp;
    finger.y += (target.y - finger.y) * lerp;
    strength += (targetStrength - strength) * 0.18;
    radius   += (targetRadius   - radius)   * 0.15;

    // draw
    gl.uniform2f(u.finger, finger.x, finger.y);
    gl.uniform1f(u.strength, strength);
    gl.uniform1f(u.radius, radius);
    gl.uniform1f(u.videoAspect, videoAspect);
    gl.uniform1f(u.bgMode, bgMode);
    gl.uniform1f(u.maskReady, maskReady ? 1.0 : 0.0);
    gl.uniform1f(u.fisheye, 1.4);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    requestAnimationFrame(render);
  }

  // ------------------------------------------------------------------
  // boot
  // ------------------------------------------------------------------
  async function boot() {
    startBtn.disabled = true;
    startBtn.textContent = 'LOADING…';
    gateSub.textContent = 'POLISHING THE MIRROR';

    let camOk = false;
    try {
      await startCamera();
      camOk = true;
    } catch (e) {
      console.warn('camera unavailable:', e);
    }

    resize();
    bindMouse();
    requestAnimationFrame(render);

    if (camOk) {
      gateSub.textContent = 'LOADING HANDS…';
      try {
        await initVision();
        setStatus('READY', true);
      } catch (e) {
        console.warn('vision unavailable, mouse fallback only:', e);
        setStatus('MOUSE ONLY', true);
        hint.textContent = 'MOVE  CURSOR  ON  THE  MIRROR';
      }
    } else {
      setStatus('NO CAMERA', false);
      hint.textContent = 'MOVE  CURSOR  ON  THE  MIRROR';
      useFallback = true;
    }

    gate.style.opacity = '0';
    gate.style.transition = 'opacity 400ms ease';
    setTimeout(() => { gate.style.display = 'none'; }, 420);
  }

  startBtn.addEventListener('click', boot, { once: true });
</script>
</body>
